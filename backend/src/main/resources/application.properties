# ─── Database (Railway MySQL env vars) ───────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
